<!DOCTYPE html>
<html>
<head>

<title>User Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">

<span class="navbar-brand">Gym Dashboard</span>

<a href="/" class="btn btn-light">Logout</a>

</div>
</nav>

<div class="container mt-4">

<h3>Available Membership Plans</h3>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Plan</th>
<th>Price</th>
<th>Action</th>
</tr>

{% for plan in plans %}

<tr>

<td>{{plan[0]}}</td>
<td>{{plan[1]}}</td>
<td>₹ {{plan[2]}}</td>

<td>
<a href="/buy/{{plan[0]}}" class="btn btn-success">Buy</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
