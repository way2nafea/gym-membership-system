<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - Gym Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:Arial,sans-serif;
        }

        .register-card{
            background:rgba(255,255,255,0.95);
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.2);
            overflow:hidden;
        }

        .register-header{
            background:linear-gradient(135deg,#28a745,#20c997);
            color:white;
            padding:2rem;
            text-align:center;
        }

        .register-header i{
            font-size:3rem;
            margin-bottom:1rem;
        }

        .form-control{
            border-radius:10px;
            border:1px solid #ddd;
            padding:0.75rem 1rem;
        }

        .form-control:focus{
            border-color:#28a745;
            box-shadow:0 0 0 0.2rem rgba(40,167,69,0.25);
        }

        .input-group-text{
            background:#f8f9fa;
            border:1px solid #ddd;
            border-radius:10px 0 0 10px;
        }

        .btn-register{
            background:linear-gradient(135deg,#28a745,#20c997);
            border:none;
            border-radius:10px;
            padding:0.75rem 1.5rem;
            font-size:1.1rem;
            font-weight:600;
        }

        .btn-register:hover{
            transform:translateY(-2px);
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        .register-footer{
            text-align:center;
            padding:1rem;
            background:#f8f9fa;
            color:#6c757d;
        }

        .password-strength{
            font-size:0.8rem;
            margin-top:5px;
        }

    </style>

</head>


<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6 col-lg-5">

<div class="register-card">

<!-- Header -->

<div class="register-header">

<i class="fas fa-user-plus"></i>

<h3 class="mb-0">Create Account</h3>

<p class="mb-0">Join Gym Management System</p>

</div>



<div class="card-body p-4">

<form method="POST">

<div class="mb-3">

<label class="form-label fw-bold">Full Name</label>

<div class="input-group">

<span class="input-group-text">
<i class="fas fa-user"></i>
</span>

<input type="text"
       name="name"
       class="form-control"
       placeholder="Enter your full name"
       required>

</div>

</div>



<div class="mb-3">

<label class="form-label fw-bold">Email Address</label>

<div class="input-group">

<span class="input-group-text">
<i class="fas fa-envelope"></i>
</span>

<input type="email"
       name="email"
       class="form-control"
       placeholder="Enter your email"
       required>

</div>

</div>



<div class="mb-3">

<label class="form-label fw-bold">Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="fas fa-lock"></i>
</span>

<input type="password"
       id="password"
       name="password"
       class="form-control"
       placeholder="Create a password"
       required minlength="6">

</div>

<div id="password-strength" class="password-strength text-muted"></div>

</div>



<div class="mb-4">

<label class="form-label fw-bold">Phone Number</label>

<div class="input-group">

<span class="input-group-text">
<i class="fas fa-phone"></i>
</span>

<input type="tel"
       name="phone"
       class="form-control"
       placeholder="Enter your phone number"
       required
       pattern="[0-9]{10}">

</div>

</div>



<button type="submit"
        class="btn btn-register text-white w-100 mb-3">

Create Account

</button>

</form>



<div class="text-center">

<p class="mb-2">Already have an account?</p>

<a href="/" class="btn btn-outline-primary w-100">
Login Here
</a>

</div>



{% if error is defined and error %}

<div class="alert alert-danger mt-3">

<i class="fas fa-exclamation-triangle"></i>
{{ error }}

</div>

{% endif %}

</div>



<div class="register-footer">

<small>
© 2026 Gym Management System. All rights reserved.
</small>

</div>

</div>

</div>

</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>

document.getElementById("password").addEventListener("input",function(){

const password=this.value;
const strengthDiv=document.getElementById("password-strength");

let strength=0;

if(password.length>=6) strength++;
if(/[A-Z]/.test(password)) strength++;
if(/[a-z]/.test(password)) strength++;
if(/[0-9]/.test(password)) strength++;
if(/[^A-Za-z0-9]/.test(password)) strength++;

if(strength<3){
strengthDiv.textContent="Weak password";
strengthDiv.className="password-strength text-danger";
}
else if(strength<5){
strengthDiv.textContent="Medium password";
strengthDiv.className="password-strength text-warning";
}
else{
strengthDiv.textContent="Strong password";
strengthDiv.className="password-strength text-success";
}

});

</script>

</body>
</html>
