<!DOCTYPE html>
<html>
<head>

<title>Plans</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h3>Membership Plans</h3>

<!-- Add Plan Form -->

<div class="card p-3 mb-4">

<form action="/admin/add_plan" method="POST">

<div class="row">

<div class="col-md-5">
<input type="text" name="plan_name" placeholder="Plan Name" class="form-control" required>
</div>

<div class="col-md-5">
<input type="number" name="price" placeholder="Price" class="form-control" required>
</div>

<div class="col-md-2">
<button class="btn btn-success w-100">Add Plan</button>
</div>

</div>

</form>

</div>


<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Plan Name</th>
<th>Price</th>
<th>Action</th>
</tr>

{% for plan in plans %}

<tr>

<td>{{plan[0]}}</td>
<td>{{plan[1]}}</td>
<td>₹ {{plan[2]}}</td>

<td>

<a href="/admin/delete_plan/{{plan[0]}}" class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
